<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KS1 Trade Coordination</title>
  <style>
    body { font-family: Arial, sans-serif; background: #050A16; color: white; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    input, select, button {
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444;
      background: #111; color: white; font-size: 16px;
    }
    button { background: #D4AF37; color: #001A3D; border: none; font-weight: bold; cursor: pointer; }
    .card { background: rgba(255,255,255,0.05); padding: 24px; border-radius: 16px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Start a New Trade</h2>
    <input type="text" id="sellerSmeId" placeholder="Seller SME ID (e.g., KS1-T5WQ)" required />
    <input type="text" id="buyerSmeId" placeholder="Buyer SME ID" required />
    <input type="number" id="amount" placeholder="Trade Amount (GHS)" required />
    <button onclick="submitTrade()">Confirm Trade</button>
    <div id="result"></div>
  </div>

  <script>
    async function submitTrade() {
      const sellerSmeId = document.getElementById('sellerSmeId').value.trim();
      const buyerSmeId = document.getElementById('buyerSmeId').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);

      if (!sellerSmeId || !buyerSmeId || isNaN(amount)) {
        alert('Please fill all fields correctly.');
        return;
      }

      // Simulate trade processing
      document.getElementById('result').innerHTML = '<p>Processing trade...</p>';

      try {
        // In real system: call escrow API
        await new Promise(r => setTimeout(r, 1000)); // simulate delay

        // 🔥 Notify Trust Score: Trade completed
        fetch('https://ks1-trust-score.onrender.com/api/trust/recalculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            smeId: sellerSmeId,
            eventType: 'transaction.completed',
            eventData: { amount }
          })
        }).catch(err => console.error('Trust Score update failed:', err));

        document.getElementById('result').innerHTML = 
          `<p style="color:#4caf50;">✅ Trade confirmed! Seller reputation updated.</p>`;
      } catch (err) {
        document.getElementById('result').innerHTML = 
          `<p style="color:#f44336;">❌ Trade failed: ${err.message}</p>`;
      }
    }
  </script>
</body>
</html>
